<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dreamwalker</title>

    <style>
        body {
            margin: 0;
            background: #000;
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        #menu {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        button {
            padding: 15px 40px;
            font-size: 20px;
            cursor: pointer;
            border-radius: 10px;
            border: none;
        }

        #game {
            display: none;
            height: 100vh;
            position: relative;
        }

        #background {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
        }

        #dialogue {
            position: absolute;
            bottom: 80px;
            left: 10%;
            width: 80%;
            padding: 25px;
            background: rgba(0,0,0,0.7);
            border-radius: 15px;
            font-size: 24px;
        }

        #next {
            position: absolute;
            bottom: 20px;
            right: 50px;
        }
    </style>
</head>


<body>


<div id="menu">

    <h1>Dreamwalker</h1>

    <button onclick="startGame()">
        Нова гра
    </button>

</div>



<div id="game">

    <div id="background"></div>

    <div id="dialogue"></div>

    <button id="next">
        Далі
    </button>

</div>



<script>

const scenes = {

    scene1: {

        background: "assets/backgrounds/scene1.jpg",

        text: "Світло міста розчинялося у нічному небі. Сьогодні починається твоя нова історія..."

    }

};



function startGame(){

    document.getElementById("menu").style.display = "none";

    document.getElementById("game").style.display = "block";

    loadScene("scene1");

}



function loadScene(name){

    let scene = scenes[name];

    document.getElementById("background").style.backgroundImage =
    `url('${scene.background}')`;


    document.getElementById("dialogue").innerText =
    scene.text;

}


</script>


</body>
</html>
